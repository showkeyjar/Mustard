name: claw-team-pr-merge

on:
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - labeled
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Attempt Claw Team auto-merge
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.claw_team_github merge-pr \
            --pr "${{ github.event.pull_request.number }}"
