name: claw-team-pr-review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Claw Team automated review
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.claw_team_github review-pr \
            --pr "${{ github.event.pull_request.number }}" \
            --event auto
